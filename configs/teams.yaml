# 2026 FIFA World Cup — finalized 48-team draw.
# Draw: 2025-12-05 (Kennedy Center, Washington D.C.)
# UEFA + Intercontinental playoffs resolved: 2026-03-31
# Sources cross-verified: NBC Sports, MLSSoccer.com, Wikipedia, FIFA.com
#
# 3-letter codes follow FIFA convention (close to but not identical to ISO 3166-1 alpha-3).

tournament:
  edition: 2026
  hosts: [USA, CAN, MEX]
  start_date: 2026-06-11
  final_date: 2026-07-19
  total_matches: 104
  format:
    group_count: 12
    teams_per_group: 4
    group_matches_total: 72   # 12 groups × 6 matches per group
    advance_top_n_per_group: 2
    advance_best_thirds: 8
    knockout_size: 32         # 24 (top-2) + 8 (best-3rd) → Round of 32

# Group draw (each row in pot order: Pot1, Pot2, Pot3, Pot4)
groups:
  A: {teams: [MEX, KOR, RSA, CZE]}
  B: {teams: [CAN, SUI, QAT, BIH]}
  C: {teams: [BRA, MAR, SCO, HAI]}
  D: {teams: [USA, AUS, PAR, TUR]}
  E: {teams: [GER, ECU, CIV, CUW]}
  F: {teams: [NED, JPN, TUN, SWE]}
  G: {teams: [BEL, IRN, EGY, NZL]}
  H: {teams: [ESP, URU, KSA, CPV]}
  I: {teams: [FRA, SEN, NOR, IRQ]}
  J: {teams: [ARG, AUT, ALG, JOR]}
  K: {teams: [POR, COL, UZB, COD]}
  L: {teams: [ENG, CRO, PAN, GHA]}

# Pre-draw seeding pots (FIFA rankings, Dec 2025)
pots:
  1: [USA, MEX, CAN, ESP, ARG, FRA, ENG, BRA, POR, NED, BEL, GER]
  2: [CRO, MAR, COL, URU, SUI, JPN, SEN, IRN, KOR, ECU, AUT, AUS]
  3: [NOR, PAN, EGY, ALG, SCO, PAR, TUN, CIV, UZB, QAT, KSA, RSA]
  4: [JOR, CPV, GHA, CUW, HAI, NZL, BIH, SWE, TUR, CZE, COD, IRQ]

