# eloratings.net 2-letter code → FIFA 3-letter code (project canon).
# Source TSV uses idiosyncratic codes (EN=England, DZ=Algeria, SQ=Scotland, CW=Curaçao).
# Covers all 48 teams in 2026 FIFA World Cup. Extend as historical opponents appear.

